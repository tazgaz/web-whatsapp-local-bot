services:
  # הבוט שבנינו
  whatsapp-bot:
    build: .
    container_name: whatsapp-bot
    ports:
      - "3000:3000"
    volumes:
      - ./.wwebjs_auth:/app/.wwebjs_auth
      - ./.wwebjs_cache:/app/.wwebjs_cache
      - ./config.json:/app/config.json
      - ./stats.json:/app/stats.json
      - ./user_states.json:/app/user_states.json
      - ./sessions.json:/app/sessions.json
      - ./configs:/app/configs
      - ./public:/app/public
      - ./index.js:/app/index.js
      - ./messageHandler.js:/app/messageHandler.js
      - ./scheduler.js:/app/scheduler.js
      - ./utils.js:/app/utils.js
    environment:
      - NODE_ENV=production
    restart: always
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - automation-network

  # מערכת n8n
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-automation
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin_password_here
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_BLOCK_FS_WRITE_ACCESS=false
      - N8N_DEFAULT_BINARY_DATA_MODE=memory
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - NODE_ENV=production
    volumes:
      - ./n8n_data:/home/node/.n8n
    restart: always
    networks:
      - automation-network

  # שרת FTP אמין יותר
  ftp-server:
    image: fauria/vsftpd
    container_name: n8n-ftp
    ports:
      - "2121:21"
      - "21100-21110:21100-21110"
    environment:
      - FTP_USER=n8n
      - FTP_PASS=n8n
      - PASV_MIN_PORT=21100
      - PASV_MAX_PORT=21110
      - PASV_ADDRESS=127.0.0.1
    volumes:
      - ./data:/home/vsftpd/n8n
    restart: always
    networks:
      - automation-network

  # Redis
  redis:
    image: redis:6-alpine
    container_name: redis-cache
    restart: always
    volumes:
      - ./redis_data:/data
    command: redis-server --requirepass n8n_redis_pass_123
    networks:
      - automation-network

networks:
  automation-network:
    driver: bridge
